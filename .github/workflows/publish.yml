name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
      - 'V*'

permissions:
  contents: read
  id-token: write # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build package
        run: npm run package

      - name: Publish to NPM
        # NPM_TOKEN must be a Granular Access Token with:
        #   - Scope: the "svelte-avatar" package (or all packages)
        #   - Permission: Read and write
        # Classic "Automation" tokens also work (bypasses 2FA for CI/CD).
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
